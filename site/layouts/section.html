{{ define "main" }}
<div class="container page">
  <h1>{{ .Title }}</h1>
  {{ if .Params.summary }}
  <p class="page-summary">{{ .Params.summary }}</p>
  {{ end }}
  {{ .Content }}
  <div class="guide-list">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="guide-card">
      <h3>{{ .Title }}</h3>
      {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
