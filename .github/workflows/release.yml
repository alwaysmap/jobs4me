name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Build zip and publish release ────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tracker dependencies
        run: cd scripts && npm install --production

      - name: Build zip
        run: |
          zip -r jobs-for-me.zip \
            .claude-plugin/plugin.json \
            scripts/tracker.js \
            scripts/package.json \
            scripts/package-lock.json \
            scripts/vendor/ \
            skills/ \
            commands/ \
            README.md \
            LICENSE \
            -x "*/.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jobs-for-me.zip
          generate_release_notes: true

  # ── 2. Notify marketplace ────────────────────────────────────────────────
  marketplace:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          repository: alwaysmap/alwaysmap-marketplace
          event-type: plugin-released
          client-payload: |
            {
              "plugin": "jfm",
              "version": "${{ github.ref_name }}"
            }
